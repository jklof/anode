name: anode-dev

channels:
  - pytorch
  - nvidia
  - conda-forge

dependencies:
  - python=3.11
  - pip
  - pytest

  # ---- PyTorch stack (must come from pytorch channel) ----
  - pytorch
  - torchaudio
  - pytorch-cuda=12.1

  # ---- Everything else ----
  - cmake
  - cxx-compiler
  - numpy
  - scipy
  - librosa
  - resampy
  - onnxruntime
  - av
  - mido
  - pysoundfile
  - portaudio
  - yt-dlp
  - pyside6

  - pip:
      - sounddevice
      - pydub
      - pytubefix
      - pylibrb
      - kokoro-onnx
      - misaki[en]
      - openai-whisper
      - webrtcvad-wheels
